AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >-
  Preview / canary Lambda + API for GreenWatt validation. Uses existing DynamoDB tables
  from the main stack so you can deploy and test code without updating greenwatt-validation.

Parameters:
  ConfigTableName:
    Type: String
    Default: greenwatt_vertical_configs
    Description: Config table from the main stack (greenwatt-lead-scoring)
  ScoreLogTableName:
    Type: String
    Default: greenwatt_score_log
    Description: Score log table from the main stack
  BuyerTableName:
    Type: String
    Default: greenwatt_buyers
    Description: Buyer table from the main stack
  PreviewFunctionName:
    Type: String
    Default: greenwatt-validation-preview
    Description: Distinct Lambda name so production function is never replaced by this deploy

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 1769
    Environment:
      Variables:
        DYNAMO_CONFIG_TABLE: !Ref ConfigTableName
        DYNAMO_SCORE_LOG_TABLE: !Ref ScoreLogTableName
        DYNAMO_BUYER_TABLE: !Ref BuyerTableName
        CONFIG_CACHE_TTL: '300'
        API_TIMEOUT_MS: '3000'

Resources:
  ValidationFunctionPreview:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref PreviewFunctionName
      Handler: src/index.handler
      CodeUri: ..
      Description: Preview / test deployment — same code path as production Lambda
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ScoreLogTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref BuyerTableName
        - CloudWatchPutMetricPolicy: {}
      Events:
        ValidateLead:
          Type: Api
          Properties:
            Path: /validate
            Method: post
        HealthCheck:
          Type: Api
          Properties:
            Path: /health
            Method: get

Outputs:
  PreviewApiUrl:
    Description: Preview API base (append /validate or /health)
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  PreviewFunctionArn:
    Description: Preview Lambda ARN (invoke directly or via API above)
    Value: !GetAtt ValidationFunctionPreview.Arn
  PreviewFunctionName:
    Description: Preview Lambda function name
    Value: !Ref ValidationFunctionPreview
